version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: televault-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      # ── Edit these paths to match your TrueNAS pool ──
      #- /mnt/pool/images:/mnt/media/images
      - /mnt/Alpha/Media/Telegram_Downloads:/mnt/media/videos
      #- /mnt/pool/documents:/mnt/media/documents
      #- /mnt/pool/other:/mnt/media/other
    networks:
      - televault
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: televault-frontend
    restart: unless-stopped
    networks:
      - televault
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: televault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - televault
    depends_on:
      - backend
      - frontend

networks:
  televault:
    driver: bridge
